<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog</title>

<link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet">

<style>

/* 🔥 GENEL */
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #1a1a1a;
}

/* DESKTOP FLIPBOOK */
#book {
    width: 100vw;
    height: 100vh;
}

/* MOBILE PDF */
#mobilePdf {
    display: none;
    width: 100vw;
    height: 100vh;
}

#mobilePdf iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* DEARFLIP FIX */
.df-container,
.df-ui,
.df-viewer,
.df-book-wrapper {
    background: #2a2a2a !important;
}

.df-page {
    background: transparent !important;
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader span {
    width: 50px;
    height: 50px;
    border: 5px solid #fff;
    border-top: 5px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="loader" id="loader">
    <span></span>
</div>

<!-- 💻 DESKTOP FLIPBOOK -->
<div id="book">
    <div class="_df_book"
         id="flipbook"
         source="1.pdf"
         backgroundcolor="transparent">
    </div>
</div>

<!-- 📱 MOBILE PDF -->
<div id="mobilePdf">
    <iframe src="1.pdf"></iframe>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
var DFLIP = window.DFLIP || {};
DFLIP.path = "https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/";
</script>

<script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>

<script>

/* 📱 MOBİL TESPİT */
function isMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

if (isMobile()) {

    // 📱 Mobile → PDF viewer
    document.getElementById("book").style.display = "none";
    document.getElementById("mobilePdf").style.display = "block";

    document.getElementById("loader").style.display = "none";

} else {

    // 💻 Desktop → Flipbook
    $(document).ready(function () {
        $('#flipbook').flipBook({
            pdf: "1.pdf",

            webgl: true,
            enableSwipe: true,
            autoEnableOutline: true,
            enableDownload: false,

            zoomRatio: 1.5,
            duration: 800,
            backgroundColor: "transparent"
        });

        document.getElementById("loader").style.display = "none";
    });

}
</script>

</body>
</html>
