<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog</title>

<link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/dflip.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/css/themify-icons.min.css" rel="stylesheet">

<style>

/* 🔥 GENEL */
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;

    background: #1a1a1a;

    background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
    background-size: 25px 25px;
}

/* BOOK */
#book {
    width: 100vw;
    height: 100vh;
}

/* 🔥 DEARFLIP OVERRIDE */
.df-container,
.df-ui,
.df-viewer,
.df-book-wrapper {
    background: #2a2a2a !important;
}

/* SAYFA GÖLGE */
.df-page {
    background: transparent !important;

    box-shadow:
        inset 0 0 40px rgba(0,0,0,0.4),
        0 20px 50px rgba(0,0,0,0.7) !important;
}

/* KİTAP */
._df_book {
    border-radius: 10px;

    box-shadow:
        0 40px 80px rgba(0,0,0,0.9),
        0 20px 40px rgba(0,0,0,0.6);
}

/* 📱 MOBİL FIX */
@media (max-width: 768px) {

    html, body {
        height: 100%;
        overflow: hidden;
    }

    #book {
        width: 100vw;
        height: 100vh !important;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    ._df_book {
        width: 100vw !important;
        height: 100vh !important;
    }

    .df-container,
    .df-viewer {
        height: 100vh !important;
    }

    canvas {
        height: 100vh !important;
        width: auto !important;
    }
}

/* LOADER */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader span {
    width: 50px;
    height: 50px;
    border: 5px solid #fff;
    border-top: 5px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="loader" id="loader">
    <span></span>
</div>

<div id="book">
    <div class="_df_book"
         id="flipbook"
         source="1.pdf"
         backgroundcolor="transparent">
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
var DFLIP = window.DFLIP || {};
DFLIP.path = "https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/";
</script>

<script src="https://cdn.jsdelivr.net/npm/@dearhive/dearflip-jquery-flipbook@1.7.3/dflip/js/dflip.min.js"></script>

<script>
$(document).ready(function () {
    $('#flipbook').flipBook({
        pdf: "1.pdf",

        webgl: true,
        enableSwipe: true,
        autoEnableOutline: true,
        enableDownload: false,

        /* 📱 MOBİL */
        singlePageMode: true,
        responsive: true,
        autoFit: true,
        fitToWidth: true,

        zoomRatio: 1.5,
        duration: 800,
        backgroundColor: "transparent"
    });

    document.getElementById("loader").style.display = "none";
});
</script>

</body>
</html>
